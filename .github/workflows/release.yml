on:
  push:
    tags:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cross-platform-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: purcell/setup-emacs@v8.0
        with:
          version: 30.2
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: |
          ./configure
          make all
          cd lisp && tar -cvf ../share.tar.gz *
      - uses: actions/upload-artifact@v7.0.1
        with:
          path: ./share.tar.gz
          archive: false

  binary-artifacts:
    strategy:
      matrix:
        - target: x86_64-unknown-freebsd
          host: ubuntu-latest
          so-suffix: so
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v6
      - uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.host }}
          args: "--locked --release"
          strip: true
      - uses: actions/upload-artifact@v7
        with:
          path: target/release/rag-core.${{ matri.so-suffix }}
