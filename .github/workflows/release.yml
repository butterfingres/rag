on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lisp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: purcell/setup-emacs@v8.0
        with:
          version: 30.2
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: lisp
          path: ./lisp/*

  rag-core:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
            so-prefix: lib
            so-suffix: so
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
            ubuntu-pkg: gcc-aarch64-linux-gnu
            rustflags: -Clinker=aarch64-linux-gnu-gcc
            so-prefix: lib
            so-suffix: so
          - target: powerpc64le-unknown-linux-gnu
            host: ubuntu-latest
            ubuntu-pkg: gcc-powerpc64le-linux-gnu
            rustflags: -Clinker=powerpc64le-linux-gnu-gcc
            so-prefix: lib
            so-suffix: so
          - target: riscv64gc-unknown-linux-gnu
            host: ubuntu-latest
            ubuntu-pkg: gcc-riscv64-linux-gnu
            rustflags: -Clinker=riscv64-linux-gnu-gcc
            so-prefix: lib
            so-suffix: so
          - target: s390x-unknown-linux-gnu
            host: ubuntu-latest
            ubuntu-pkg: gcc-s390x-linux-gnu
            rustflags: -Clinker=s390x-linux-gnu-gcc
            so-prefix: lib
            so-suffix: so
          - target: x86_64-pc-windows-msvc
            host: windows-latest
            so-suffix: dll
          - target: aarch64-pc-windows-msvc
            host: windows-latest
            so-suffix: dll
          - target: aarch64-apple-darwin
            host: macos-latest
            so-prefix: lib
            so-suffix: dylib
          - target: x86_64-apple-darwin
            host: macos-latest
            so-prefix: lib
            so-suffix: dylib
          - target: x86_64-unknown-freebsd
            host: ubuntu-latest
            so-prefix: lib
            so-suffix: so

    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v6
      - if: ${{ matrix.ubuntu-pkg }}
        run: |
          sudo apt-get -y install ${{ matrix.ubuntu-pkg }}
      - uses: houseabsolute/actions-rust-cross@v1
        env:
          RUSTFLAGS: "-Ccodegen-units=1 ${{ matrix.rustflags }}"
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--locked --release"
          strip: true
      - shell: bash
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.so-prefix }}rag_core.${{ matrix.so-suffix }} rag-core.${{ matrix.so-suffix }}
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: rag-core-${{ matrix.target }}
          path: rag-core.${{ matrix.so-suffix }}

  release:
    needs: [lisp, rag-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
      - run: |
          find
      # - uses: softprops/action-gh-release@v3.0.1
      #   if: github.ref_type == 'tag'
      #   with:
      #     files: "*"
