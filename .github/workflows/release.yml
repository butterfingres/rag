  binary-artifacts:
    strategy:
      matrix:
        target:
          # - x86_64-unknown-linux-gnu
          # - aarch64-unknown-linux-gnu
          - loongarch64-unknown-linux-gnu
          - powerpc64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - loongarch64-unknown-linux-musl
          - powerpc64-unknown-linux-musl
          # - x86_64-pc-windows-msvc
          # - aarch64-pc-windows-msvc
          # - aarch64-apple-darwin
          - x86_64-apple-darwin
          # - x86_64-unknown-freebsd
          - x86_64-unknown-netbsd
        include:
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
            so-prefix: lib
            so-suffix: so
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
            so-prefix: lib
            so-suffix: so
          - target: loongarch64-unknown-linux-gnu
            host: ubuntu-latest
            so-prefix: lib
            so-suffix: so
          - target: powerpc64-unknown-linux-gnu
            host: ubuntu-latest
            so-prefix: lib
            so-suffix: so
          - target: aarch64-unknown-linux-musl
            host: ubuntu-latest
            so-prefix: lib
            so-suffix: so
          - target: loongarch64-unknown-linux-musl
            host: ubuntu-latest
            so-prefix: lib
            so-suffix: so
          - target: powerpc64-unknown-linux-musl
            host: ubuntu-latest
            so-prefix: lib
            so-suffix: so
          - target: x86_64-pc-windows-msvc
            host: windows-latest
            so-suffix: dll
          - target: aarch64-pc-windows-msvc
            host: windows-latest
            so-suffix: dll
          - target: aarch64-apple-darwin
            host: macos-latest
            so-prefix: lib
            so-suffix: dylib
          - target: x86_64-apple-darwin
            host: macos-latest
            so-prefix: lib
            so-suffix: dylib
          - target: x86_64-unknown-freebsd
            host: ubuntu-latest
            so-prefix: lib
            so-suffix: so
          - target: x86_64-unknown-netbsd
            host: ubuntu-latest
            so-prefix: lib
            so-suffix: so
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v6
      - uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--locked --release"
          strip: true
      - shell: bash
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.so-prefix }}rag_core.${{ matrix.so-suffix }} rag-core.${{ matrix.so-suffix }}
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.target }}
          path: rag-core.${{ matrix.so-suffix }}
