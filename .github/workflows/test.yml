on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get -y update
          sudo apt-get -y install emacs-nox rustc rust-clippy rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: |
          ./configure
          make check
