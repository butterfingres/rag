on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jcs090218/setup-emacs@v3
        with:
          version: 29.2
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: "clippy, rustfmt"
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: |
          ./configure
          make check
