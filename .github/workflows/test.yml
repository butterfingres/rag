on:
  push:
    paths:
      - ".github/workflows/test.yml"
      - "src/**.rs"
      - "lisp/**.rs"
      - "Cargo.*"
      - "Makefile"
      - "configure"
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jcs090218/setup-emacs@v3
        with:
          version: 30.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: "clippy, rustfmt"
      - name: Test
        run: |
          ./configure
          make check -kj
